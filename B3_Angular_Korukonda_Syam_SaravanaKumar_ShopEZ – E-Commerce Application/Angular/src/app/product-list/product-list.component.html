<div class="products-page">

<div class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0 text-purple">
      <i class="bi bi-shop-window me-2"></i>Our Products
    </h2>
  </div>

  <!-- Filter & Search Bar -->
  <div class="filter-bar p-3 mb-4 rounded shadow-sm bg-light border">
    <div class="row g-3 align-items-center">
      
      <!-- Search -->
      <div class="col-md-5">
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
          <input class="form-control" 
                 [(ngModel)]="searchTerm" 
                 (ngModelChange)="onSearch($event)" 
                 placeholder="Search products by name...">
        </div>
      </div>

      <!-- CATEGORY ICON BAR -->
      <div class="category-bar mb-4">

        <!-- ALL -->
        <div class="category-item"
            [class.active]="selectedCat === ''"
            (click)="onCategory('')">

          <img src="assets/categories/all.png">
          <span>All</span>

        </div>

        <!-- LOOP -->
        <div class="category-item"
            *ngFor="let cat of categories"
            [class.active]="selectedCat === cat.name"
            (click)="onCategory(cat.name)">

          <img [src]="cat.img" (error)="onImgErr($event)">
          <span>{{ cat.name }}</span>

        </div>

      </div>

      <!-- Clear Filters -->
      <div class="col-md-4 text-md-end text-center">
        <button class="btn btn-outline-secondary btn-sm fw-bold px-3" (click)="clearFilters()">
          <i class="bi bi-x-circle me-1"></i>Clear Filters
        </button>
      </div>

    </div>
  </div>

  <!-- Loading State -->
  <div class="text-center py-5" *ngIf="loading$ | async">
    <div class="spinner-border text-purple" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <!-- Empty State -->
  <div class="text-center py-5 empty-state" *ngIf="!(loading$ | async) && displayedProducts.length === 0">
    <i class="bi bi-search display-1 text-muted opacity-25"></i>
    <h4 class="mt-3 text-secondary">No products found</h4>
    <p class="text-muted">Try adjusting your search or clearing your filters.</p>
  </div>

  <!-- Products Grid -->
  <div class="row g-4" *ngIf="!(loading$ | async) && displayedProducts.length > 0">
    
    <div class="col-12 col-sm-6 col-lg-4 col-xl-3" *ngFor="let product of displayedProducts">
      <div class="card h-100 shopez-product-card shadow-sm">
        
        <!-- Image Wrapper -->
        <div class="img-wrapper">
        
          <img [src]="product.imageUrl || 'assets/images/no-image.png'" 
            (error)="onImgErr($event)" 
            class="card-img-top product-img" 
            [alt]="product.name">

        <!-- Card Body -->
        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold mb-1">{{ product.name }}</h5>
          <p class="card-text text-muted small product-desc flex-grow-1">{{ product.description }}</p>
          <div class="fw-bold fs-4 text-success mb-3">₹{{ product.price }}</div>
          
          <!-- Add to Cart Button -->
          <button 
            class="btn btn-purple w-100 fw-bold mt-auto" 
            (click)="addToCart(product)" 
            [disabled]="addingId === product.productId">
            
            <ng-container *ngIf="addingId !== product.productId">
              <i class="bi bi-cart-plus me-2"></i>Add to Cart
            </ng-container>
            
            <ng-container *ngIf="addingId === product.productId">
              <span class="spinner-border spinner-border-sm me-2" role="status"></span>
              Adding...
            </ng-container>

          </button>

          <button 
            class="btn btn-success w-100 mt-2"
            (click)="buyNow(product)">
            Buy Now
          </button>
        </div>

      </div>
    </div>

  </div>

</div>

</div>
