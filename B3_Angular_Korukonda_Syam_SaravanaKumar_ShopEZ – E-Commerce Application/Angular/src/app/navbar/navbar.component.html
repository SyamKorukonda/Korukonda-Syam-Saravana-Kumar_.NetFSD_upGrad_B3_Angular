<nav class="navbar navbar-expand-lg shopez-navbar shadow-sm sticky-top">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center gap-3" routerLink="/home">

      <!-- Logo -->
      <img src="assets/images/logo.png"
           alt="ShopEZ Logo"
           style="height:60px; width:auto; object-fit:contain;">

      <!-- Brand Name -->
      <span class="fw-bold text-white fs-4">
        Shop<span class="text-warning">EZ</span>
      </span>

    </a>

    <!-- Toggle -->
    <button class="navbar-toggler border-0" type="button"
      data-bs-toggle="collapse" data-bs-target="#navMenu">
      <i class="bi bi-list text-white fs-3"></i>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">

      <!-- LEFT MENU -->
      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/home">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-white" routerLink="/products">Products</a>
        </li>

        <!-- Cart (NEW - moved here) -->
        <li class="nav-item" *ngIf="isLoggedIn$ | async">
          <a class="nav-link text-white" routerLink="/cart">
            Cart
            <span class="badge bg-warning text-dark ms-1"
                  *ngIf="(cartCount$ | async)! > 0">
              {{ cartCount$ | async }}
            </span>
          </a>
        </li>

        <!-- Orders -->
        <li class="nav-item" *ngIf="isLoggedIn$ | async">
          <a class="nav-link text-white" routerLink="/my-orders">
            My Orders
          </a>
        </li>

        <!-- Admin -->
        <li class="nav-item dropdown" *ngIf="(role$ | async) === 'Admin'">
          <a class="nav-link dropdown-toggle text-white" data-bs-toggle="dropdown">
            Admin
          </a>

          <ul class="dropdown-menu dropdown-menu-dark">
            <li><a class="dropdown-item" routerLink="/admin/dashboard">Dashboard</a></li>
            <li><a class="dropdown-item" routerLink="/admin/products">Products</a></li>
            <li><a class="dropdown-item" routerLink="/admin/orders">Orders</a></li>
            <li><a class="dropdown-item" routerLink="/admin/users">Users</a></li>
          </ul>
        </li>

      </ul>

      <!-- RIGHT MENU -->
      <ul class="navbar-nav ms-auto align-items-center gap-2">

        <!-- Theme -->
        <li class="nav-item">
          <button class="btn btn-outline-light btn-sm"
                  (click)="toggleTheme()">
            {{ (isDark$ | async) ? 'Light' : 'Dark' }}
          </button>
        </li>

        <!-- Guest -->
        <ng-container *ngIf="!(isLoggedIn$ | async)">
          <li>
            <a class="btn btn-outline-light btn-sm" routerLink="/login">Login</a>
          </li>
          <li>
            <a class="btn btn-warning btn-sm" routerLink="/register">Register</a>
          </li>
        </ng-container>

        <!-- Logout -->
        <li *ngIf="isLoggedIn$ | async">
          <button class="btn btn-outline-light btn-sm" (click)="logout()">
            Logout
          </button>
        </li>

      </ul>

    </div>
  </div>
</nav>
