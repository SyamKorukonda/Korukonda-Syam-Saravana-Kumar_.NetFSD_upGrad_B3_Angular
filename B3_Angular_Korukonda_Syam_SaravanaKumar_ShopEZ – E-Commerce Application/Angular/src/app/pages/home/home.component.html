<!-- HERO SECTION (Main landing banner) -->
<section class="shopez-hero d-flex align-items-center">
  <div class="container">
    <div class="row align-items-center g-5">

      <!-- LEFT CONTENT -->
      <div class="col-lg-6">

        <!-- Badge -->
        <span class="badge bg-warning text-dark mb-3 px-3 py-2 rounded-pill fs-6">
          ShopEZ — Your Smart Store
        </span>

        <!-- Title -->
        <h1 class="display-4 fw-bold text-white mb-4">
          Shop Smarter,<br>
          <span class="text-warning">Live Better</span>
        </h1>

        <!-- Description -->
        <p class="lead text-white-50 mb-4">
          Thousands of products at unbeatable prices.
        </p>

        <!-- Buttons -->
        <div class="d-flex gap-3">
          <a routerLink="/products" class="btn btn-warning btn-lg">
            Shop Now
          </a>

          <a routerLink="/register" class="btn btn-outline-light btn-lg">
            Join Free
          </a>
        </div>

      </div>

      <!-- RIGHT IMAGE -->
      <div class="col-lg-6 text-center d-none d-lg-block">
        <img src="assets/images/banner.png"
             class="img-fluid hero-img">
      </div>

    </div>
  </div>
</section>


<!-- FEATURES SECTION -->
<section class="py-5">
  <div class="container">

    <h2 class="text-center fw-bold mb-3">
      Why Choose <span class="text-purple">ShopEZ?</span>
    </h2>

    <div class="row g-4">

      <!-- Loop through features -->
      <div class="col-md-3" *ngFor="let f of features">

        <div class="card text-center p-4 shopez-feature-card">

          <!-- Icon -->
          <div class="feature-icon-wrap mb-3">
            <i class="bi fs-2" [class]="f.icon"></i>
          </div>

          <!-- Title -->
          <h5>{{ f.title }}</h5>

          <!-- Description -->
          <p class="text-muted small">{{ f.desc }}</p>

        </div>

      </div>

    </div>
  </div>
</section>


<!-- CTA SECTION -->
<section class="shopez-cta text-center text-white py-5">
  <div class="container">

    <h2>Ready to Start Shopping?</h2>

    <a routerLink="/products" class="btn btn-warning mt-3">
      Browse Products
    </a>

  </div>
</section>
