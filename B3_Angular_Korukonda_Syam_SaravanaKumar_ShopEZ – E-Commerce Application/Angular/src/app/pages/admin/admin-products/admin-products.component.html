<div class="admin-page">

  <div class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="text-white fw-bold">Manage Products</h2>

      <button class="btn btn-warning fw-bold" (click)="openForm()">
        + Add Product
      </button>
    </div>

    <!-- FORM -->
    <div *ngIf="showForm" class="form-card mb-4">

      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="row g-3">

          <!-- Name -->
          <div class="col-md-6">
            <label>Name</label>
            <input class="form-control" formControlName="name">
            <small class="text-danger" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
              Name is required
            </small>
          </div>

          <!-- Price -->
          <div class="col-md-3">
            <label>Price</label>
            <input type="number" class="form-control" formControlName="price">
            <small class="text-danger" *ngIf="form.get('price')?.invalid && form.get('price')?.touched">
              Invalid price
            </small>
          </div>

          <!-- Stock -->
          <div class="col-md-3">
            <label>Stock</label>
            <input type="number" class="form-control" formControlName="stock">
          </div>

          <!-- CATEGORY (NEW) -->
          <div class="col-md-6">
            <label>Category</label>

            <select class="form-control" formControlName="category">
              <option value="">Select Category</option>
              <option>Electronics</option>
              <option>Fashion</option>
              <option>Furniture</option>
              <option>Groceries</option>
              <option>Fruits</option>
              <option>Camera</option>
              <option>Two-wheelers</option>
              <option>Mobiles</option>
              <option>Shoes</option>
              <option>Bags</option>
              <option>Appliances</option>
              <option>Accessories</option>
              <option>Jewellery</option>
              <option>Toys</option>
            </select>

            <small class="text-danger" *ngIf="form.get('category')?.invalid && form.get('category')?.touched">
              Category is required
            </small>
          </div>

          <!-- IMAGE URL (NEW) -->
          <div class="col-md-6">
            <label>Image URL</label>

            <input class="form-control" formControlName="imageUrl" placeholder="Paste image URL">
          </div>

          <!-- IMAGE PREVIEW (NEW ) -->
          <div class="col-12" *ngIf="form.value.imageUrl">
            <img [src]="form.value.imageUrl" (error)="onImgErr($event)" style="height:80px; border-radius:8px;">
          </div>

          <!-- Description -->
          <div class="col-12">
            <label>Description</label>
            <textarea class="form-control" rows="3" formControlName="description"></textarea>
          </div>

          <!-- Buttons -->
          <div class="col-12 d-flex gap-2">

            <button class="btn btn-purple" [disabled]="form.invalid || saving">
              {{ saving ? 'Saving...' : 'Submit' }}
            </button>

            <button type="button" class="btn btn-outline-secondary" (click)="cancelForm()">
              Cancel
            </button>

          </div>

        </div>

      </form>

    </div>

    <!-- PRODUCT LIST -->
    <div class="row g-4">

      <div class="col-md-4 col-lg-3" *ngFor="let p of products$ | async">

        <div class="product-card">

          <!-- IMAGE -->
          <div class="img-wrap">
            <img [src]="p.imageUrl || 'assets/images/no-image.png'" (error)="onImgErr($event)">
          </div>

          <!-- INFO -->
          <div class="p-3">

            <h6 class="fw-bold mb-1">{{ p.name }}</h6>
            <p class="text-success fw-bold mb-2">₹{{ p.price }}</p>

            <div class="d-flex gap-2">

              <button class="btn btn-sm btn-edit" (click)="edit(p)">
                Edit
              </button>

              <button class="btn btn-sm btn-delete" (click)="delete(p.productId)">
                Delete
              </button>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
