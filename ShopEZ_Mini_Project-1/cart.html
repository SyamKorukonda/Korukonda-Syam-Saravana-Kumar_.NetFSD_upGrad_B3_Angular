<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <!-- Bootstrap CSS: provides responsive layout and pre-designed components -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS: used for project-specific styling -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Navbar: top navigation bar for branding and quick access -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <!-- Brand link: redirects user to homepage -->
    <a class="navbar-brand" href="index.html">ShopEZ</a>

    <!-- Cart button: displays number of items in cart -->
    <div class="ms-auto">
        <a href="cart.html" class="btn btn-light text-dark">
            Cart (<span id="cartCount">0</span>)
        </a>
    </div>

</nav>

<!-- Full-width container for breadcrumb navigation -->
<div class="container-fluid px-5 mt-3">

    <nav>

        <!-- Breadcrumb: shows current page path -->
        <ol class="breadcrumb p-3 bg-light rounded">

            <!-- Navigation links -->
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="products.html">Products</a></li>

            <!-- Active page -->
            <li class="breadcrumb-item active">Cart</li>

        </ol>

    </nav>

</div>

<!-- Main container for cart content -->
<div class="container-fluid px-5 mt-4 mb-5">

    <!-- Heading: indicates current section -->
    <h2 class="mb-4">Your Cart</h2>

    <!-- Responsive wrapper for table -->
    <div class="table-responsive">

        <!-- Table: displays cart items -->
        <table class="table table-bordered table-hover text-center align-middle">

            <!-- Table header -->
            <thead class="table-dark">
                <tr>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Action</th>
                </tr>
            </thead>

            <!-- Table body: dynamically filled using JavaScript -->
            <tbody id="cartTable"></tbody>

        </table>

    </div>

    <!-- Total section: shows total price and checkout button -->
    <div class="d-flex justify-content-between align-items-center mt-4 p-4 bg-light rounded shadow-sm">

        <!-- Total amount display -->
        <h3 class="m-0">
            Total: 
            <span class="text-success">₹<span id="total"></span></span>
        </h3>

        <!-- Checkout button: navigates to checkout page -->
        <a href="checkout.html" class="btn btn-success btn-lg px-5">
            Proceed to Checkout
        </a>

    </div>

</div>

<!-- jQuery: simplifies JavaScript operations -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Cart JS: handles cart functionality like add/remove/update -->
<script src="js/cart.js"></script>

<!-- Common JS: updates cart count across pages -->
<script src="js/common.js"></script>

</body>
</html>
