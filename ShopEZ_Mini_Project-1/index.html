<!DOCTYPE html>
<html>
<head>
    <title>ShopEZ - Home</title>

    <!-- Bootstrap CSS:
          Helps create responsive layout and ready-made components like navbar, buttons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- styling file
         Used to customize colors, fonts, layout beyond Bootstrap -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Viewport Meta Tag:
         Controls page scaling on different devices
         Makes website responsive on mobile, tablet, desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- Navbar
     Allows user to navigate and access cart easily -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

    <!-- Brand Name:
         Website title/logo
         Helps user identify website and return to homepage -->
    <a class="navbar-brand" href="index.html">ShopEZ</a>

    <!-- Cart Button:
         Gives quick access to cart and shows number of items -->
    <div class="ms-auto">
        <a href="cart.html" class="btn btn-outline-light">
            Cart (<span id="cartCount">0</span>)
        </a>
    </div>
</nav>


<div class="container-fluid text-center mt-5 px-4">

    <h1 class="display-4">Welcome to ShopEZ 🛒</h1>

    <p class="lead">Your one-stop shop for all products</p>

    <!-- Call-To-Action Button:
         Button to go to products page
         Directs user to main functionality (shopping) -->
    <a href="products.html" class="btn btn-primary btn-lg mt-3">
        Shop Now
    </a>
</div>


<div class="container-fluid px-5 mt-5">

    <div class="row text-center">

        <!-- Feature 1 -->
        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h5>Fast Delivery</h5>
                <p>Get your products quickly</p>
            </div>
        </div>

        <!-- Feature 2 -->
        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h5>Secure Payment</h5>
                <p>Safe and trusted payments</p>
            </div>
        </div>

        <!-- Feature 3 -->
        <div class="col-md-4 mb-3">
            <div class="card p-4">
                <h5>Best Quality</h5>
                <p>Top rated products</p>
            </div>
        </div>

    </div>
</div>

<!-- jQuery Library:
     JavaScript library
     Simplifies DOM manipulation and event handling -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Common JS
    Used to update cart count across all pages -->
<script src="js/common.js"></script>

</body>
</html>
