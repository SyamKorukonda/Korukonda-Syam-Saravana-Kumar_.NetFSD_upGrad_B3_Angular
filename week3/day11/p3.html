<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cart Counter</title>

    <style>
    .product{ margin:10px; }
    .msg{ color:green; }
    </style>
    </head>
    <body>

    <h1>Cart Counter</h1><hr>
    <h2>Cart: <span id="count">0</span></Cart:span></h2> <!--small inline text (best for numbers/messages)-->

    <div class="product">
        Mobile <button class="add">Add to cart</button> <span class="msg"></span>
    </div>

    <div class="product">
        Laptop <button class="add">Add to cart</button> <span class="msg"></span>
    </div>
    <div class="product">
        Headphones <button class="add">Add to cart</button> <span class="msg"></span>
    </div>

    <div class="product">
        Keyboard <button class="add">Add to cart</button> <span class="msg"></span>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(document).ready(function(){
            let c=0;
            $(".add").click(function(){
                c++;
                $("#count").text(c);

                $(this).prop("disabled","true"); //disables button
                $(this).text("Added");

                $(this).next(".msg").text("Item added"); //moves to the next element beside button.
            });
        });
    </script>
</body>
</html>
