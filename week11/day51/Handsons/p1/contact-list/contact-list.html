<h3>Contact List</h3>

<table border="1">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Action</th>
  </tr>

  @for (c of contacts; track c.id) {
    <tr>
      <td>{{c.id}}</td>
      <td>{{c.name}}</td>
      <td>{{c.email}}</td>
      <td>{{c.phone}}</td>
      <td>
        <button (click)="deleteContact(c.id)">Delete</button>
      </td>
    </tr>
  }
</table>

<br><hr><br>

<h3>Add Contact</h3>

<input [(ngModel)]="newContact.id" placeholder="ID"><br>
<input [(ngModel)]="newContact.name" placeholder="Name"><br>
<input [(ngModel)]="newContact.email" placeholder="Email"><br>
<input [(ngModel)]="newContact.phone" placeholder="Phone"><br>

<button (click)="addContact()">Add</button>
